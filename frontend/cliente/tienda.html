<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andreita Moda - Tienda</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;background:#fff5f7}
        .navbar{background:white;padding:1rem 5%;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 10px rgba(0,0,0,.1);position:sticky;top:0;z-index:1000}
        .logo{display:flex;align-items:center;gap:10px}
        .logo img{width:45px;height:45px;border-radius:10px;object-fit:cover}
        .logo h1{color:#e91e63;font-size:1.5em}
        .cart-icon{position:relative;cursor:pointer;font-size:1.5em}
        #cartCount{position:absolute;top:-10px;right:-10px;background:#e91e63;color:white;border-radius:50%;padding:2px 8px;font-size:.5em;font-weight:bold}
        .hero{background:linear-gradient(135deg,#f093fb,#f5576c);padding:80px 5%;text-align:center;color:white}
        .hero h2{font-size:2.5em;margin-bottom:15px}
        .hero button{padding:15px 40px;background:white;color:#e91e63;border:none;border-radius:30px;cursor:pointer;font-weight:bold;font-size:1.1em}
        .filters{padding:30px 5% 10px;text-align:center}
        .filters h2{color:#333;margin-bottom:20px;font-size:2em}
        .filter-buttons{display:flex;justify-content:center;flex-wrap:wrap;gap:10px}
        .filter-btn{padding:10px 20px;background:white;border:2px solid #e91e63;color:#e91e63;border-radius:25px;cursor:pointer;font-weight:500}
        .filter-btn.active,.filter-btn:hover{background:#e91e63;color:white}
        .products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:25px;padding:20px 5% 40px}
        .product-card{background:white;border-radius:15px;overflow:hidden;box-shadow:0 5px 15px rgba(0,0,0,.1);cursor:pointer;transition:transform .3s}
        .product-card:hover{transform:translateY(-10px)}
        .product-card img{width:100%;height:300px;object-fit:cover}
        .no-image{height:300px;background:#fce4ec;display:flex;align-items:center;justify-content:center;color:#e91e63;font-size:3em}
        .product-info{padding:20px}
        .category-badge{display:inline-block;background:#fce4ec;color:#e91e63;padding:4px 12px;border-radius:15px;font-size:.8em;margin-bottom:10px}
        .product-info h3{color:#333;margin-bottom:8px}
        .product-info .price{font-size:1.8em;color:#e91e63;font-weight:bold;margin-bottom:10px}
        .btn-comprar{width:100%;padding:12px;background:linear-gradient(135deg,#f093fb,#f5576c);color:white;border:none;border-radius:8px;font-weight:bold;cursor:pointer}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:2000;overflow-y:auto}
        .modal-content{background:white;margin:50px auto;padding:30px;width:90%;max-width:500px;border-radius:20px;position:relative;text-align:center}
        .close{position:absolute;top:15px;right:20px;font-size:30px;cursor:pointer;color:#999}
        .whatsapp-btn{position:fixed;bottom:30px;right:30px;background:#25D366;color:white;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;box-shadow:0 5px 15px rgba(37,211,102,.4);z-index:1000;text-decoration:none}
        footer{background:#333;color:white;padding:40px 5% 20px;margin-top:40px;text-align:center}
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
           <img src="fronterd/img/748499257_1020543733912844_134962174345621059_n.jpg " alt="Logo" onerror="this.style.display='none'">
            <h1>✨ Andreita Moda</h1>
        </div>
        <div class="cart-icon" onclick="verCarrito()">🛒<span id="cartCount">0</span></div>
    </nav>

    <section class="hero">
        <h2>Descubre tu Estilo Único</h2>
        <p style="margin-bottom:25px">Moda femenina que refleja tu personalidad ✨</p>
        <button onclick="document.getElementById('productos').scrollIntoView({behavior:'smooth'})">🛍️ Ver Colección</button>
    </section>

    <section class="filters" id="productos">
        <h2>Nuestra Colección</h2>
        <div class="filter-buttons">
            <button class="filter-btn active" onclick="filtrar('todos',this)">🌟 Todos</button>
            <button class="filter-btn" onclick="filtrar('vestidos',this)">👗 Vestidos</button>
            <button class="filter-btn" onclick="filtrar('blusas',this)">👚 Blusas</button>
            <button class="filter-btn" onclick="filtrar('pantalones',this)">👖 Pantalones</button>
            <button class="filter-btn" onclick="filtrar('faldas',this)">🩳 Faldas</button>
            <button class="filter-btn" onclick="filtrar('accesorios',this)">👜 Accesorios</button>
        </div>
    </section>

    <div id="productsGrid" class="products-grid"><p style="text-align:center;color:#999;grid-column:1/-1;padding:50px">Cargando...</p></div>

    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="cerrarModal()">&times;</span>
            <div id="modalDetails"></div>
        </div>
    </div>

    <a href="https://wa.me/+59160036671" target="_blank" class="whatsapp-btn"><i class="fa-brands fa-whatsapp"></i><p style=.whatsapp{color:#25D366;}></a>

    <footer><p style="color:#999">&copy; 2026 Andreita Moda</p></footer>

    <script>
        const API_URL = '/api';
        let todosLosProductos = [];
        let carrito = [];

        document.addEventListener('DOMContentLoaded', cargarProductos);

        async function cargarProductos() {
            try {
                const r = await fetch(API_URL + '/productos');
                todosLosProductos = await r.json();
                mostrar(todosLosProductos);
            } catch (e) {
                document.getElementById('productsGrid').innerHTML = '<p style="text-align:center;color:red;grid-column:1/-1">❌ Error</p>';
            }
        }

        function mostrar(productos) {
            const g = document.getElementById('productsGrid');
            if (!productos.length) { g.innerHTML = '<p style="text-align:center;color:#999;grid-column:1/-1;padding:50px">📭 No hay productos</p>'; return; }
            g.innerHTML = productos.map(p => `
                <div class="product-card" onclick="verDetalle(${p.id})">
                    ${p.imagen ? `<img src="/uploads/${p.imagen}" alt="${p.nombre}">` : '<div class="no-image">👗</div>'}
                    <div class="product-info">
                        <span class="category-badge">${p.categoria||'General'}</span>
                        <h3>${p.nombre}</h3>
                        <p class="price">Bs ${parseFloat(p.precio).toFixed(2)}</p>
                        <button class="btn-comprar" onclick="event.stopPropagation();agregarCarrito(${p.id})">🛒 Agregar</button>
                    </div>
                </div>`).join('');
        }

        function filtrar(cat, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            mostrar(cat === 'todos' ? todosLosProductos : todosLosProductos.filter(p => p.categoria === cat));
        }

        async function verDetalle(id) {
            const r = await fetch(API_URL + '/productos/' + id);
            const p = await r.json();
            document.getElementById('modalDetails').innerHTML = `
                ${p.imagen ? `<img src="/uploads/${p.imagen}" style="width:100%;border-radius:10px;margin-bottom:15px">` : ''}
                <h2>${p.nombre}</h2>
                <p style="font-size:2em;color:#e91e63;font-weight:bold">Bs ${parseFloat(p.precio).toFixed(2)}</p>
                <p>📏 ${p.talla||'N/A'} | 🎨 ${p.color||'N/A'}</p>
                <p style="margin:15px 0">${p.descripcion||''}</p>
                <button class="btn-comprar" onclick="agregarCarrito(${p.id});cerrarModal()">🛒 Agregar al Carrito</button>`;
            document.getElementById('productModal').style.display = 'block';
        }

        function cerrarModal() { document.getElementById('productModal').style.display = 'none'; }

        async function agregarCarrito(id) {
            const p = todosLosProductos.find(x => x.id === id);
            if (p) {
                carrito.push(p);
                document.getElementById('cartCount').textContent = carrito.length;
                try {
                    await fetch(API_URL + '/notificaciones', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ producto_id: p.id, producto_nombre: p.nombre, producto_precio: p.precio, cliente_ip: 'Cliente' })
                    });
                } catch (e) {}
                alert('✅ Agregado al carrito');
            }
        }

        async function verCarrito() {
            if (!carrito.length) { alert('🛒 Carrito vacío'); return; }
            let total = 0;
            let msg = '🛍️ TU CARRITO\n\n';
            carrito.forEach((p, i) => { msg += `${i+1}. ${p.nombre} - Bs ${parseFloat(p.precio).toFixed(2)}\n`; total += parseFloat(p.precio); });
            msg += `\n💰 TOTAL: Bs ${total.toFixed(2)}`;
            
            if (confirm(msg + '\n\n¿Proceder con el pago?')) {
                try {
                    const r = await fetch(API_URL + '/configuracion');
                    const c = await r.json();
                    document.getElementById('modalDetails').innerHTML = `
                        <h2>💳 Datos para el Pago</h2>
                        ${c.qr_imagen ? `<img src="/uploads/${c.qr_imagen}" style="max-width:250px;border-radius:10px;margin:15px 0">` : '<p>QR no configurado</p>'}
                        <p><strong>🏦 Banco:</strong> ${c.banco_nombre||'No especificado'}</p>
                        <p><strong>👤 Titular:</strong> ${c.cuenta_titular||'No especificado'}</p>
                        <p><strong>🔢 Cuenta:</strong> ${c.numero_cuenta||'No especificado'}</p>
                        <p style="font-size:1.5em;color:#e91e63;font-weight:bold;margin:15px 0">Total: Bs ${total.toFixed(2)}</p>
                        ${c.whatsapp ? `<a href="https://wa.me/${c.whatsapp}?text=Hola%20Andreita%20Moda,%20confirmo%20mi%20compra%20por%20Bs%20${total.toFixed(2)}" target="_blank" style="display:inline-block;padding:12px 30px;background:#25D366;color:white;border-radius:25px;text-decoration:none;font-weight:bold;margin-top:10px">📱 Enviar comprobante</a>` : ''}`;
                    document.getElementById('productModal').style.display = 'block';
                    carrito = [];
                    document.getElementById('cartCount').textContent = '0';
                } catch (e) { alert('Error al cargar datos de pago'); }
            }
        }

        window.onclick = function(e) { if (e.target == document.getElementById('productModal')) cerrarModal(); }
        document.addEventListener('keydown', function(e) { if (e.key === 'Escape') cerrarModal(); });
    </script>
</body>
</html>
