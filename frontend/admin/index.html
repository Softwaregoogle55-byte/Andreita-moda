<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andreita Moda - Admin</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#f093fb,#f5576c);min-height:100vh}
        .login-container{display:flex;justify-content:center;align-items:center;min-height:100vh}
        .login-box{background:white;padding:40px;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center;width:400px}
        .login-box h1{color:#e91e63;font-size:2.5em;margin-bottom:10px}
        .login-box h2{color:#666;margin-bottom:30px}
        .login-box input{width:100%;padding:12px;margin:10px 0;border:2px solid #e0e0e0;border-radius:8px;font-size:16px}
        .login-box button{width:100%;padding:12px;background:linear-gradient(135deg,#f093fb,#f5576c);color:white;border:none;border-radius:8px;font-size:18px;font-weight:bold;cursor:pointer;margin-top:20px}
        .error-msg{color:red;margin-top:10px;display:none}
        .admin-panel{background:#f5f5f5;min-height:100vh}
        header{background:white;padding:15px 30px;box-shadow:0 2px 10px rgba(0,0,0,.1);display:flex;justify-content:space-between;align-items:center}
        header h1{color:#e91e63;font-size:1.5em}
        .header-right{display:flex;align-items:center;gap:15px}
        .notification-bell{position:relative;cursor:pointer;font-size:1.8em}
        .notification-badge{position:absolute;top:-8px;right:-8px;background:red;color:white;border-radius:50%;padding:2px 7px;font-size:.4em;font-weight:bold}
        .notification-badge:empty{display:none}
        .btn-logout{padding:10px 20px;background:#dc3545;color:white;border:none;border-radius:5px;cursor:pointer;font-weight:bold}
        .tabs{display:flex;gap:5px;padding:20px 30px 0;background:#f5f5f5}
        .tab-btn{padding:12px 25px;background:#ddd;border:none;border-radius:10px 10px 0 0;cursor:pointer;font-weight:bold;font-size:.95em}
        .tab-btn.active{background:white;color:#e91e63}
        .container{max-width:1400px;margin:0 auto;padding:20px;display:grid;grid-template-columns:1fr 1fr;gap:20px}
        .form-box,.list-box{background:white;padding:30px;border-radius:15px;box-shadow:0 5px 15px rgba(0,0,0,.1)}
        .form-box h2,.list-box h2{color:#e91e63;margin-bottom:20px}
        .form-group{margin-bottom:15px}
        .form-group label{display:block;margin-bottom:5px;color:#333;font-weight:500}
        .form-group input,.form-group textarea,.form-group select{width:100%;padding:10px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;font-family:inherit}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:15px}
        .form-actions{display:flex;gap:10px;margin-top:20px}
        .btn-primary{padding:12px 30px;background:linear-gradient(135deg,#f093fb,#f5576c);color:white;border:none;border-radius:8px;font-size:16px;font-weight:bold;cursor:pointer;flex:1}
        .btn-secondary{padding:12px 30px;background:#6c757d;color:white;border:none;border-radius:8px;cursor:pointer}
        .products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:15px}
        .product-card{background:#fff5f7;border-radius:10px;overflow:hidden;border:1px solid #fce4ec}
        .product-card img{width:100%;height:180px;object-fit:cover}
        .product-info{padding:15px}
        .product-info h3{margin-bottom:8px;color:#333;font-size:1em}
        .product-info .price{font-size:1.3em;color:#e91e63;font-weight:bold;margin-bottom:8px}
        .card-actions{display:flex;gap:8px}
        .card-actions button{flex:1;padding:8px;border:none;border-radius:5px;cursor:pointer;font-weight:bold;font-size:.85em}
        .btn-edit{background:#ffc107;color:#333}
        .btn-delete{background:#dc3545;color:white}
        .notifications-panel{background:white;padding:30px;border-radius:15px;box-shadow:0 5px 15px rgba(0,0,0,.1)}
        .notifications-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
        .notifications-header h2{color:#e91e63}
        .btn-mark-all{padding:8px 15px;background:#28a745;color:white;border:none;border-radius:5px;cursor:pointer;font-size:.9em}
        .notification-item{display:flex;justify-content:space-between;align-items:center;padding:15px;margin-bottom:10px;border-radius:10px;border-left:4px solid #e91e63}
        .notification-item.no-leida{background:#fff5f7;font-weight:500}
        .notification-item.leida{background:#f9f9f9;opacity:.7}
        .notification-content .mensaje{font-size:1em;color:#333;margin-bottom:5px}
        .notification-content .fecha{font-size:.8em;color:#999}
        .notification-actions{display:flex;gap:8px}
        .btn-leer{padding:5px 10px;background:#007bff;color:white;border:none;border-radius:5px;cursor:pointer;font-size:.8em}
        .btn-eliminar{padding:5px 10px;background:#dc3545;color:white;border:none;border-radius:5px;cursor:pointer;font-size:.8em}
        .qr-preview img{max-width:200px;border-radius:10px;margin:10px 0}
        @media(max-width:1024px){.container{grid-template-columns:1fr}}
        @media(max-width:600px){.form-row{grid-template-columns:1fr}.login-box{width:90%}}
    </style>
</head>
<body>
    <!-- Login -->
    <div id="loginSection" class="login-container">
        <div class="login-box">
            <h1>✨ Andreita Moda</h1>
            <h2>Panel Administrativo</h2>
            <input type="text" id="username" placeholder="👤 Usuario">
            <input type="password" id="password" placeholder="🔑 Contraseña">
            <button onclick="login()">Iniciar Sesión</button>
            <p id="loginError" class="error-msg"></p>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="adminPanel" class="admin-panel" style="display:none">
        <header>
            <h1>✨ Andreita Moda - Admin</h1>
            <div class="header-right">
                <div class="notification-bell" onclick="cambiarTab('notificaciones')">🔔<span id="notificationBadge" class="notification-badge"></span></div>
                <button class="btn-logout" onclick="logout()">🚪 Salir</button>
            </div>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="cambiarTab('productos')">📦 Productos</button>
            <button class="tab-btn" onclick="cambiarTab('notificaciones')">🔔 Notificaciones</button>
            <button class="tab-btn" onclick="cambiarTab('configuracion')">⚙️ Configuración</button>
        </div>

        <!-- Productos -->
        <div id="tabProductos" class="container">
            <div class="form-box">
                <h2 id="formTitle">➕ Agregar Producto</h2>
                <input type="hidden" id="productId">
                <div class="form-group"><label>Nombre *</label><input type="text" id="nombre" required></div>
                <div class="form-group"><label>Descripción</label><textarea id="descripcion" rows="3"></textarea></div>
                <div class="form-row">
                    <div class="form-group"><label>Precio (Bs) *</label><input type="number" id="precio" step="0.01" required></div>
                    <div class="form-group"><label>Categoría</label><select id="categoria"><option value="">Seleccionar</option><option value="vestidos">Vestidos</option><option value="blusas">Blusas</option><option value="pantalones">Pantalones</option><option value="faldas">Faldas</option><option value="accesorios">Accesorios</option><option value="chaquetas">Chaquetas</option></select></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Talla</label><select id="talla"><option value="">Seleccionar</option><option value="XS">XS</option><option value="S">S</option><option value="M">M</option><option value="L">L</option><option value="XL">XL</option></select></div>
                    <div class="form-group"><label>Color</label><input type="text" id="color"></div>
                </div>
                <div class="form-group"><label>📷 Imagen</label><input type="file" id="imagen" accept="image/*"></div>
                <div class="form-actions">
                    <button class="btn-primary" onclick="guardarProducto()">💾 Guardar</button>
                    <button class="btn-secondary" onclick="limpiar()">🗑️ Limpiar</button>
                </div>
            </div>
            <div class="list-box">
                <h2>📦 Productos</h2>
                <div id="productsGrid" class="products-grid"><p style="color:#999;text-align:center">Cargando...</p></div>
            </div>
        </div>

        <!-- Notificaciones -->
        <div id="tabNotificaciones" class="container" style="display:none;grid-template-columns:1fr">
            <div class="notifications-panel">
                <div class="notifications-header">
                    <h2>🔔 Notificaciones</h2>
                    <button class="btn-mark-all" onclick="marcarTodasLeidas()">✓ Marcar todas leídas</button>
                </div>
                <div id="notificationsList"><p style="color:#999;text-align:center">Cargando...</p></div>
            </div>
        </div>

        <!-- Configuración -->
        <div id="tabConfiguracion" class="container" style="display:none;grid-template-columns:1fr">
            <div class="notifications-panel">
                <div class="notifications-header"><h2>⚙️ Configuración de Pago QR</h2></div>
                <form id="configForm" enctype="multipart/form-data" style="max-width:600px">
                    <div class="form-group">
                        <label>📷 Imagen QR actual</label>
                        <div id="qrPreview" class="qr-preview"></div>
                        <input type="file" id="qr_imagen" accept="image/*">
                        <input type="hidden" id="qr_imagen_actual">
                    </div>
                    <div class="form-group"><label>🏦 Nombre del Banco</label><input type="text" id="banco_nombre" placeholder="Ej: Banco Nacional de Bolivia"></div>
                    <div class="form-group"><label>👤 Titular</label><input type="text" id="cuenta_titular" placeholder="Ej: Andreita Moda"></div>
                    <div class="form-group"><label>🔢 Número de cuenta / CI</label><input type="text" id="numero_cuenta" placeholder="Ej: 123456789"></div>
                    <div class="form-group"><label>📱 WhatsApp</label><input type="text" id="whatsapp" placeholder="Ej: 591XXXXXXXXX"></div>
                    <button type="submit" class="btn-primary">💾 Guardar Configuración</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api';
        let currentId = null;

        // ========== LOGIN ==========
        async function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const err = document.getElementById('loginError');
            err.style.display = 'none';
            try {
                const r = await fetch(API_URL + '/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                if (r.ok) {
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('adminPanel').style.display = 'block';
                    cargarProductos();
                    setInterval(actualizarContador, 10000);
                } else {
                    err.textContent = '❌ Usuario o contraseña incorrectos';
                    err.style.display = 'block';
                }
            } catch (e) {
                err.textContent = '❌ Error de conexión';
                err.style.display = 'block';
            }
        }

        function logout() {
            document.getElementById('loginSection').style.display = 'flex';
            document.getElementById('adminPanel').style.display = 'none';
        }

        // ========== TABS ==========
        function cambiarTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tabProductos').style.display = 'none';
            document.getElementById('tabNotificaciones').style.display = 'none';
            document.getElementById('tabConfiguracion').style.display = 'none';

            if (tab === 'productos') {
                document.getElementById('tabProductos').style.display = 'grid';
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                cargarProductos();
            } else if (tab === 'notificaciones') {
                document.getElementById('tabNotificaciones').style.display = 'grid';
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                cargarNotificaciones();
            } else if (tab === 'configuracion') {
                document.getElementById('tabConfiguracion').style.display = 'grid';
                document.querySelectorAll('.tab-btn')[2].classList.add('active');
                cargarConfiguracion();
            }
        }

        // ========== PRODUCTOS ==========
        async function cargarProductos() {
            try {
                const r = await fetch(API_URL + '/productos');
                const p = await r.json();
                const g = document.getElementById('productsGrid');
                if (!p.length) { g.innerHTML = '<p style="color:#999;text-align:center">📭 Sin productos</p>'; return; }
                g.innerHTML = p.map(x => `
                    <div class="product-card">
                        ${x.imagen ? `<img src="/uploads/${x.imagen}" alt="${x.nombre}">` : '<div style="height:180px;background:#fce4ec;display:flex;align-items:center;justify-content:center;color:#e91e63">Sin img</div>'}
                        <div class="product-info">
                            <h3>${x.nombre}</h3>
                            <p class="price">Bs ${parseFloat(x.precio).toFixed(2)}</p>
                            <div class="card-actions">
                                <button class="btn-edit" onclick="editar(${x.id})">✏️</button>
                                <button class="btn-delete" onclick="eliminar(${x.id})">🗑️</button>
                            </div>
                        </div>
                    </div>`).join('');
            } catch (e) {}
        }

        async function guardarProducto() {
            const f = new FormData();
            f.append('nombre', document.getElementById('nombre').value);
            f.append('descripcion', document.getElementById('descripcion').value);
            f.append('precio', document.getElementById('precio').value);
            f.append('categoria', document.getElementById('categoria').value);
            f.append('talla', document.getElementById('talla').value);
            f.append('color', document.getElementById('color').value);
            const img = document.getElementById('imagen').files[0];
            if (img) f.append('imagen', img);
            const url = currentId ? API_URL + '/productos/' + currentId : API_URL + '/productos';
            const method = currentId ? 'PUT' : 'POST';
            try {
                await fetch(url, { method, body: f });
                alert('✅ Guardado');
                limpiar();
                cargarProductos();
            } catch (e) { alert('❌ Error'); }
        }

        async function editar(id) {
            try {
                const r = await fetch(API_URL + '/productos/' + id);
                const p = await r.json();
                document.getElementById('formTitle').textContent = '✏️ Editar Producto';
                document.getElementById('productId').value = p.id;
                document.getElementById('nombre').value = p.nombre;
                document.getElementById('descripcion').value = p.descripcion || '';
                document.getElementById('precio').value = p.precio;
                document.getElementById('categoria').value = p.categoria || '';
                document.getElementById('talla').value = p.talla || '';
                document.getElementById('color').value = p.color || '';
                currentId = id;
                window.scrollTo({top:0,behavior:'smooth'});
            } catch (e) {}
        }

        async function eliminar(id) {
            if (!confirm('¿Eliminar?')) return;
            try { await fetch(API_URL + '/productos/' + id, { method: 'DELETE' }); alert('✅ Eliminado'); cargarProductos(); } catch (e) {}
        }

        function limpiar() {
            document.getElementById('productId').value = '';
            document.getElementById('formTitle').textContent = '➕ Agregar Producto';
            document.getElementById('nombre').value = '';
            document.getElementById('descripcion').value = '';
            document.getElementById('precio').value = '';
            document.getElementById('categoria').value = '';
            document.getElementById('talla').value = '';
            document.getElementById('color').value = '';
            document.getElementById('imagen').value = '';
            currentId = null;
        }

        // ========== NOTIFICACIONES ==========
        async function cargarNotificaciones() {
            try {
                const r = await fetch(API_URL + '/notificaciones');
                const n = await r.json();
                const l = document.getElementById('notificationsList');
                if (!n.length) { l.innerHTML = '<p style="color:#999;text-align:center">📭 Sin notificaciones</p>'; return; }
                l.innerHTML = n.map(x => `
                    <div class="notification-item ${x.leido ? 'leida' : 'no-leida'}">
                        <div class="notification-content">
                            <p class="mensaje">${x.mensaje}</p>
                            <p class="fecha">📅 ${new Date(x.fecha).toLocaleString('es-BO')}</p>
                        </div>
                        <div class="notification-actions">
                            ${!x.leido ? `<button class="btn-leer" onclick="marcarLeida(${x.id})">✓</button>` : ''}
                            <button class="btn-eliminar" onclick="eliminarNoti(${x.id})">🗑️</button>
                        </div>
                    </div>`).join('');
            } catch (e) {}
        }

        async function actualizarContador() {
            try {
                const r = await fetch(API_URL + '/notificaciones/no-leidas');
                const d = await r.json();
                const b = document.getElementById('notificationBadge');
                b.textContent = d.total > 0 ? d.total : '';
            } catch (e) {}
        }

        async function marcarLeida(id) { await fetch(API_URL + '/notificaciones/' + id + '/leer', { method: 'PUT' }); cargarNotificaciones(); actualizarContador(); }
        async function marcarTodasLeidas() { await fetch(API_URL + '/notificaciones/leer-todas', { method: 'PUT' }); cargarNotificaciones(); actualizarContador(); }
        async function eliminarNoti(id) { if (confirm('¿Eliminar?')) { await fetch(API_URL + '/notificaciones/' + id, { method: 'DELETE' }); cargarNotificaciones(); actualizarContador(); } }

        // ========== CONFIGURACIÓN ==========
        async function cargarConfiguracion() {
            try {
                const r = await fetch(API_URL + '/configuracion');
                const c = await r.json();
                document.getElementById('qr_imagen_actual').value = c.qr_imagen || '';
                document.getElementById('banco_nombre').value = c.banco_nombre || '';
                document.getElementById('cuenta_titular').value = c.cuenta_titular || '';
                document.getElementById('numero_cuenta').value = c.numero_cuenta || '';
                document.getElementById('whatsapp').value = c.whatsapp || '';
                const preview = document.getElementById('qrPreview');
                preview.innerHTML = c.qr_imagen ? `<img src="/uploads/${c.qr_imagen}" alt="QR">` : '<p style="color:#999">Sin QR</p>';
            } catch (e) {}
        }

        document.getElementById('configForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const f = new FormData();
            f.append('banco_nombre', document.getElementById('banco_nombre').value);
            f.append('cuenta_titular', document.getElementById('cuenta_titular').value);
            f.append('numero_cuenta', document.getElementById('numero_cuenta').value);
            f.append('whatsapp', document.getElementById('whatsapp').value);
            f.append('qr_imagen_actual', document.getElementById('qr_imagen_actual').value);
            const file = document.getElementById('qr_imagen').files[0];
            if (file) f.append('qr_imagen', file);
            try {
                await fetch(API_URL + '/configuracion', { method: 'PUT', body: f });
                alert('✅ Configuración guardada');
                cargarConfiguracion();
            } catch (e) { alert('❌ Error'); }
        });
    </script>
</body>
</html>
